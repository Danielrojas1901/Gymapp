<style>
:root{
  --bg:#f5f5f3;--bg2:#fff;--bg3:#ebebea;
  --t1:#1a1a1a;--t2:#555;--t3:#888;--t4:#aaa;
  --bd:#e0e0dc;--bd2:#ccc;--acc:#1D9E75;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
[data-dark]{
  --bg:#111;--bg2:#1c1c1e;--bg3:#2c2c2e;
  --t1:#f2f2f7;--t2:#aeaeb2;--t3:#636366;--t4:#3a3a3c;
  --bd:#2c2c2e;--bd2:#3a3a3c;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{font-family:-apple-system,'SF Pro Text',sans-serif;background:var(--bg);color:var(--t1);
  padding-top:var(--safe-top);
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  overscroll-behavior:none;
}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
input{background:var(--bg2);border:.5px solid var(--bd2);border-radius:10px;padding:8px 10px;font-family:inherit;color:var(--t1);outline:none;-webkit-appearance:none;font-size:16px;}
input:focus{border-color:var(--acc);}
button{font-family:inherit;-webkit-appearance:none;cursor:pointer;}
button:active{opacity:.7;}
.tab-btn{flex:1;padding:10px 0;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;}
.card{background:var(--bg2);border:.5px solid var(--bd);border-radius:14px;}
.day-row{display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:8px;border-radius:14px;border:.5px solid var(--bd);background:var(--bg2);}
#app{max-width:430px;margin:0 auto;padding-bottom:calc(58px + var(--safe-bot));min-height:100vh;}
.scroll-area{-webkit-overflow-scrolling:touch;overflow-y:auto;}
/* Sticky header accounts for safe area */
.sticky-hdr{position:sticky;top:0;z-index:50;background:var(--bg2);border-bottom:.5px solid var(--bd);}
/* Bottom nav */
#bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;border-top:.5px solid var(--bd);background:var(--bg2);display:flex;z-index:100;padding-bottom:var(--safe-bot);}
/* Note popover */
.note-pop{position:absolute;bottom:calc(100% + 6px);right:0;background:var(--bg2);border:.5px solid var(--bd);border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.14);z-index:150;min-width:200px;overflow:hidden;}
.note-opt{display:flex;align-items:center;gap:10px;padding:11px 14px;font-size:14px;color:var(--t1);background:none;border:none;width:100%;text-align:left;border-bottom:.5px solid var(--bd);}
.note-opt:last-child{border-bottom:none;}
.note-opt:active{background:var(--bg3);}
</style>
</head>

// Default base schedule (permanent)
const BASE_SCH={
  0:{type:'rest',  label:'Descanso',muscle:'Recuperación activa',       color:'#888780'},
  1:{type:'push',  label:'PUSH',    muscle:'Pecho · Hombros · Tríceps', color:'#1D9E75'},

const TYPE_META={

  pull:  {label:'PULL',    muscle:'Espalda · Bíceps',          color:'#7F77DD'},

  hyrox: {label:'HYROX',   muscle:'Funcional · Opcional',      color:'#BA7517',optional:true},
  rest:  {label:'Descanso',muscle:'Recuperación activa',       color:'#888780'},
};

const MEALS=[
  {time:'Desayuno',color:'#EF9F27',items:['3 huevos enteros','Queso blanco o mozzarella','Fruta, pan o pan árabe'],tip:'Fines de semana: + arepa y granos'},

  {time:'Cena',    color:'#7F77DD',items:['150g proteína animal (ideal)','Vegetales libres','1 carbo moderado (papa o arroz)'],tip:'Rápida: arepa/pan + huevo, atún o pollo'},

];

// ── STATE ────────────────────────────────────────────────────────────────────
const todayIdx=new Date().getDay();
const TODAY=new Date().toISOString().slice(0,10);
let wakeLock=null;
const S={
  tab:'today',viewDay:todayIdx,
  completed:{},weights:{},notes:{},exHistory:{},
  timerSec:null,timerDur:60,timerInterval:null,
  weightLog:[],newWeight:'',
  darkMode:false,streak:0,weekDates:[],
  sessionStart:null,showChart:null,showSummary:false,
  notePopover:null,
  userAge:30,
  chefInput:'', chefResult:'', chefLoading:false,
  coachResult:'', coachLoading:false,
  currentPhase: 1,          // 1 | 2 | 3
  customSchedule: null,     // null = use BASE_SCH, or {0:type, 1:type, ...} permanent overrides
  dayOverride: null,        // {dayIdx, type} — temporary override for today only, cleared next day
  showPlanEditor: false,
};

// ── DERIVED GETTERS ──────────────────────────────────────────────────────────
function getSCH(){
  const base = S.customSchedule || {};
  const result = {};
  for(let i=0;i<7;i++){
    const type = base[i] || BASE_SCH[i].type;
    result[i] = {...TYPE_META[type], type};
  }
  // Apply temp day override (only for today)
  if(S.dayOverride && S.dayOverride.date===TODAY){
    const {dayIdx,type}=S.dayOverride;
    result[dayIdx]={...TYPE_META[type],type};
  }
  return result;
}
function getWK(){ return PHASES[S.currentPhase].workouts; }


// ── STORAGE ──────────────────────────────────────────────────────────────────
function ls(k){try{const r=localStorage.getItem('jr_'+k);return r!=null?JSON.parse(r):null;}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem('jr_'+k,JSON.stringify(v));}catch(e){}}
function loadStorage(){
  const map={wlog:'weightLog',ew:'weights',eh:'exHistory',en:'notes',str:'streak',wd:'weekDates',dm:'darkMode',td:'timerDur',age:'userAge',ph:'currentPhase',cs:'customSchedule',dov:'dayOverride'};
  Object.entries(map).forEach(([k,t])=>{const v=ls(k);if(v!=null)S[t]=v;});
  if(S.darkMode)document.documentElement.setAttribute('data-dark','');
  // Clear stale temp override
  if(S.dayOverride && S.dayOverride.date!==TODAY){ S.dayOverride=null; lsSet('dov',null); }
}
function savePart(k){
  const map={weightLog:'wlog',weights:'ew',exHistory:'eh',notes:'en',streak:'str',weekDates:'wd',darkMode:'dm',timerDur:'td',userAge:'age',currentPhase:'ph',customSchedule:'cs',dayOverride:'dov'};
  if(map[k])lsSet(map[k],S[k]);
}
function recordEntry(exId){
  const ws=S.weights[exId]||[],ns=S.notes[exId]||[];
  if(!ws.some(v=>parseFloat(v)>0))return;
  if(!S.exHistory[exId])S.exHistory[exId]=[];
  S.exHistory[exId]=[...S.exHistory[exId].filter(e=>e.date!==TODAY),
    {date:TODAY,sets:ws.map(v=>parseFloat(v)||0),notes:[...ns]}
  ].sort((a,b)=>a.date.localeCompare(b.date)).slice(-24);
  savePart('exHistory');
}
function markWorkoutDay(){
  if(!S.weekDates.includes(TODAY)){S.weekDates.push(TODAY);savePart('weekDates');}
  const now=new Date(),mon=new Date(now);
  mon.setDate(now.getDate()-((now.getDay()+6)%7));
  const ws=mon.toISOString().slice(0,10);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const we=sun.toISOString().slice(0,10);
  const cnt=S.weekDates.filter(d=>d>=ws&&d<=we).length;
  if(cnt>=3){S.streak=Math.max(S.streak,1);savePart('streak');}
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function planWeek(){return Math.max(1,Math.floor((new Date()-new Date(PLAN_START+'T12:00:00'))/(7*864e5))+1);}
function fmtD(ds){return new Date(ds+'T12:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'short'});}
function fmtT(s){const m=Math.floor(s/60);return m>0?`${m}:${String(s%60).padStart(2,'0')}`:`${s}s`;}

// BMI and Body Fat (Deurenberg formula for males)
function calcBMI(w){return w/Math.pow(HEIGHT_M,2);}
function calcBF(w,age){const bmi=calcBMI(w);return 1.20*bmi+0.23*age-16.2-10.8;} // males: -10.8
function bfCategory(bf){
  if(bf<6) return {label:'Esencial',color:'#378ADD'};
  if(bf<14)return {label:'Atlético', color:'#1D9E75'};
  if(bf<18)return {label:'Fitness',  color:'#7F77DD'};
  if(bf<25)return {label:'Aceptable',color:'#EF9F27'};
  return           {label:'Alto',    color:'#D85A30'};
}
function bmiCategory(bmi){
  if(bmi<18.5)return {label:'Bajo peso',   color:'#378ADD'};
  if(bmi<25)  return {label:'Normal',       color:'#1D9E75'};
  if(bmi<30)  return {label:'Sobrepeso',    color:'#EF9F27'};
  if(bmi<35)  return {label:'Obesidad I',   color:'#D85A30'};
  return             {label:'Obesidad II',  color:'#c0392b'};
}

function exportCSV(){
  const rows=[['Ejercicio','Fecha','S1kg','S2kg','S3kg','S4kg','Nota S1','Nota S2','Nota S3','Nota S4']];
  Object.values(getWK()).flat().forEach(ex=>{
    (S.exHistory[ex.id]||[]).forEach(e=>{
      rows.push([ex.name,e.date,...Array(4).fill(0).map((_,i)=>(e.sets||[])[i]||''),...Array(4).fill(0).map((_,i)=>(e.notes||[])[i]||'')]);
    });
  });
  rows.push([],[' Peso corporal','Fecha','kg']);
  S.weightLog.forEach(e=>rows.push(['',e.date,e.weight]));
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='gym_jorge.csv';a.click();
}

// ── AI CALLS ─────────────────────────────────────────────────────────────────
async function callClaude(systemPrompt, userMessage){
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      system: systemPrompt,
      messages:[{role:'user',content:userMessage}]
    })
  });
  const data = await res.json();
  return data.content?.map(b=>b.text||'').join('') || 'Error al obtener respuesta.';
}

async function runChef(){
  if(!S.chefInput.trim()||S.chefLoading) return;
  S.chefLoading=true; S.chefResult=''; renderContent();
  const currentW = S.weightLog.length ? S.weightLog[S.weightLog.length-1].weight : 120;
  const proteinGoal = Math.round(currentW * 1.8);
  try {
    S.chefResult = await callClaude(
      `Eres un chef nutricionista experto. El usuario es Jorge, masculino, ${currentW}kg, 181cm, meta de perder grasa y ganar músculo. 
      Su plan alimenticio: desayuno con huevos y queso blanco, almuerzo con proteína + papa/arroz + caraotas/lentejas, cena con proteína + vegetales, snack de yogurt o fruta.
      Meta proteína diaria: ~${proteinGoal}g. Evitar: queso amarillo, frituras excesivas, azúcar. 
      Responde SIEMPRE en español venezolano, de forma concisa y práctica. 
      Cuando sugiereas recetas, incluye: ingredientes, preparación simple en pasos cortos, macros aproximados (proteína/carbs/grasa) y tiempo de prep. 
      Máximo 300 palabras.`,
      S.chefInput.trim()
    );
  } catch(e){ S.chefResult='Error de conexión. Intenta de nuevo.'; }
  S.chefLoading=false; renderContent();
}

async function runCoach(){
  if(S.coachLoading) return;
  S.coachLoading=true; S.coachResult=''; renderContent();
  // Build workout history summary
  const allEx = Object.values(getWK()).flat();
  const histSummary = allEx.map(ex=>{
    const hist = S.exHistory[ex.id]||[];
    if(!hist.length) return null;
    const recent = hist.slice(-4);
    const maxKg = Math.max(...hist.flatMap(e=>e.sets||[]).filter(Boolean));
    const lastSets = recent[recent.length-1]?.sets||[];
    const trend = recent.length>=2 ? (()=>{
      const a=Math.max(...(recent[0].sets||[]).filter(Boolean)||[0]);
      const b=Math.max(...(recent[recent.length-1].sets||[]).filter(Boolean)||[0]);
      return b>a?'↑':b<a?'↓':'=';
    })() : '?';
    return `${ex.name}: últimas ${recent.length} ses. [${recent.map(e=>(e.sets||[]).join('/')).join(' | ')}] kg, PR: ${maxKg}kg, tendencia: ${trend}`;
  }).filter(Boolean).join('\n');
  const currentW = S.weightLog.length ? S.weightLog[S.weightLog.length-1].weight : 120;
  const weightTrend = S.weightLog.length>=2 ? (S.weightLog[S.weightLog.length-1].weight - S.weightLog[0].weight).toFixed(1) : null;
  try {
    S.coachResult = await callClaude(
      `Eres un coach de entrenamiento y nutrición deportiva experto. El usuario es Jorge: masculino, ${currentW}kg actual (inicio: 122.5kg), 181cm, meta perder grasa y ganar músculo. 
      Lleva ${planWeek()} semanas de entrenamiento. Rutina PPL: Push lunes, Cardio martes/jueves, Pull miércoles, Legs viernes, HYROX opcional sábado. 
      Responde SIEMPRE en español, tono motivador pero directo. Sé específico con nombres de ejercicios. Máximo 350 palabras.`,
      `Analiza mi progreso basado en este historial y dame recomendaciones concretas de mejora:\n\nHistorial de ejercicios:\n${histSummary||'Sin historial aún'}\n\nPeso corporal: ${currentW}kg${weightTrend?`, variación total: ${weightTrend}kg`:''}\nSemana del plan: ${planWeek()}`
    );
  } catch(e){ S.coachResult='Error de conexión. Intenta de nuevo.'; }
  S.coachLoading=false; renderContent();
}

// ── TIMER ────────────────────────────────────────────────────────────────────
function startTimer(){
  if(S.timerInterval)clearInterval(S.timerInterval);
  S.timerSec=S.timerDur;
  S.timerInterval=setInterval(()=>{
    S.timerSec--;
    if(S.timerSec<=0){clearInterval(S.timerInterval);S.timerInterval=null;S.timerSec=null;}
    renderTimer();
  },1000);
  renderTimer();
}
function stopTimer(){if(S.timerInterval)clearInterval(S.timerInterval);S.timerInterval=null;S.timerSec=null;renderTimer();}

function toggleSet(exId,si,total){
  if(!S.completed[exId])S.completed[exId]=[];
  S.completed[exId][si]=!S.completed[exId][si];
  if(S.completed[exId][si]){
    if(!S.sessionStart)S.sessionStart=Date.now();
    startTimer();
    if(S.completed[exId].filter(Boolean).length===total)recordEntry(exId);
  }
  const exs=getWK()[getSCH()[S.viewDay].type]||[];
  if(exs.length>0&&exs.every(ex=>ex.sets.every((_,i)=>!!(S.completed[ex.id]||[])[i]))){
    markWorkoutDay();S.showSummary=true;
  }
  renderContent();
}

function addWeight(){
  const w=parseFloat(S.newWeight);
  if(!w||w<30||w>300)return;
  S.weightLog=[...S.weightLog.filter(e=>e.date!==TODAY),{date:TODAY,weight:w}].sort((a,b)=>a.date.localeCompare(b.date)).slice(-90);
  S.newWeight='';savePart('weightLog');renderContent();
}

// ── DOM HELPER ───────────────────────────────────────────────────────────────
function h(tag,attrs,...ch){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for(const c of ch.flat()){if(c==null)continue;el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);}
  return el;
}

function renderNotePopover(exId,si,anchorEl){
  // Remove existing
  const old=document.getElementById('note-pop');if(old)old.remove();
  const pop=document.createElement('div');
  pop.id='note-pop';

  NOTE_PRESETS.forEach(p=>{

    btn.addEventListener('click',e=>{
      e.stopPropagation();
      if(!S.notes[exId])S.notes[exId]=[];
      S.notes[exId][si]=p.icon+' '+p.label;
      savePart('notes');
      pop.remove();
      S.notePopover=null;
      renderContent();
    });
    pop.appendChild(btn);
  });

function renderChartModal(exId){
  const ex=Object.values(getWK()).flat().find(e=>e.id===exId);

  if(!ex||!hist.length)return null;
  const overlay=h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:300,display:'flex',alignItems:'flex-end',justifyContent:'center'}});
  const panel=h('div',{style:{background:'var(--bg2)',borderRadius:'20px 20px 0 0',padding:'1.25rem 1rem',paddingBottom:`calc(1.5rem + var(--safe-bot))`,width:'430px',maxWidth:'100vw',maxHeight:'82vh',overflowY:'auto'}});

  ));
  const vals=hist.map(e=>Math.max(...(e.sets||[0]).filter(Boolean)));
  const W=340,H=120,pad=30;
  const minV=Math.min(...vals)-2,maxV=Math.max(...vals)+2;
  const xSc=i=>(i/(vals.length-1||1))*(W-pad*2)+pad;
  const ySc=v=>H-pad-((v-minV)/(maxV-minV||1))*(H-pad*2);
  const pts=vals.map((v,i)=>({x:xSc(i),y:ySc(v),v}));
  const pl=pts.map(p=>`${p.x},${p.y}`).join(' ');
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);svg.setAttribute('width','100%');svg.setAttribute('height',H);
  svg.innerHTML=`
    <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1D9E75" stop-opacity="0.25"/><stop offset="100%" stop-color="#1D9E75" stop-opacity="0"/></linearGradient></defs>
    <polygon points="${pl} ${pts[pts.length-1].x},${H-4} ${pts[0].x},${H-4}" fill="url(#cg)"/>
    <polyline points="${pl}" fill="none" stroke="#1D9E75" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4.5" fill="#1D9E75"/><text x="${p.x}" y="${p.y-10}" text-anchor="middle" font-size="9" fill="#888">${p.v}kg</text>`).join('')}
    <text x="${pad}" y="${H-6}" font-size="8" fill="#aaa">${fmtD(hist[0].date)}</text>
    ${hist.length>1?`<text x="${W-pad}" y="${H-6}" text-anchor="end" font-size="8" fill="#aaa">${fmtD(hist[hist.length-1].date)}</text>`:''}
  `;
  panel.appendChild(svg);
  const tbl=h('div',{style:{marginTop:'0.75rem',display:'flex',flexDirection:'column',gap:6}});
  [...hist].reverse().slice(0,8).forEach(entry=>{
    tbl.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:'var(--bg3)',borderRadius:10,fontSize:13}},
      h('span',{style:{color:'var(--t3)',minWidth:56,fontSize:12}},fmtD(entry.date)),
      h('div',{style:{display:'flex',gap:5,flex:1,flexWrap:'wrap'}},
        ...(entry.sets||[]).map((kg,i)=>h('span',{style:{padding:'2px 7px',borderRadius:6,fontSize:12,background:'var(--bg2)',border:'.5px solid var(--bd)',color:'var(--t2)'}},`S${i+1}: ${kg}kg`))
      ),
      h('button',{style:{background:'none',border:'none',color:'var(--t4)',fontSize:15,padding:'0 2px'},
        onClick:()=>{if(!confirm('¿Eliminar este registro?'))return;S.exHistory[exId]=S.exHistory[exId].filter(e=>e.date!==entry.date);savePart('exHistory');if(!S.exHistory[exId].length)S.showChart=null;renderContent();}
      },'🗑')
    ));
  });
  panel.appendChild(tbl);
  overlay.appendChild(panel);
  overlay.addEventListener('click',e=>{if(e.target===overlay){S.showChart=null;renderContent();}});
  return overlay;
}

              color:kg===maxKg&&isMax?'#1D9E75':'var(--t3)',

            }},`S${idx+1}: ${kg||'—'}kg`))
          ),
          h('button',{style:{background:'none',border:'none',color:'var(--t4)',fontSize:14,padding:'0 2px',flexShrink:0},
            onClick:()=>{if(!confirm(`¿Eliminar registro del ${fmtD(entry.date)}?`))return;S.exHistory[ex.id]=S.exHistory[ex.id].filter(e=>e.date!==entry.date);savePart('exHistory');renderContent();}

  // BMI + BF card

  // IMC row
  statCard.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
    h('div',{},
      h('div',{style:{fontSize:12,color:'var(--t3)',marginBottom:2}},'IMC · Índice de Masa Corporal'),

    h('div',{style:{textAlign:'right',fontSize:11,color:'var(--t3)',lineHeight:1.6}},
      'Normal: 18.5–24.9',h('br',{}),'Sobrepeso: 25–29.9',h('br',{}),'Obesidad I: 30–34.9'
    )
  ));
  // IMC bar
  const imcPct=Math.min(100,Math.max(0,(bmi-15)/(45-15)*100));
  const imcMarkers=[{pct:(18.5-15)/(45-15)*100,col:'#378ADD'},{pct:(25-15)/(45-15)*100,col:'#1D9E75'},{pct:(30-15)/(45-15)*100,col:'#EF9F27'},{pct:(35-15)/(45-15)*100,col:'#D85A30'}];

  imcBar.appendChild(marker);
  statCard.appendChild(imcBar);

  // Divider
  statCard.appendChild(h('div',{style:{borderTop:'.5px solid var(--bd)',marginBottom:10}}));

  // BF row
  const bfRounded=Math.round(bf*10)/10;
  statCard.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
    h('div',{},
      h('div',{style:{fontSize:12,color:'var(--t3)',marginBottom:2}},'Grasa corporal estimada'),
      h('div',{style:{display:'flex',alignItems:'baseline',gap:8}},
        h('span',{style:{fontSize:24,fontWeight:700,color:'var(--t1)'}},bfRounded+'%'),
        h('span',{style:{fontSize:12,padding:'2px 8px',borderRadius:6,background:bfCat.color+'18',color:bfCat.color,fontWeight:500}},bfCat.label)
      )
    ),
    h('div',{style:{textAlign:'right',fontSize:11,color:'var(--t3)',lineHeight:1.7}},

    )

  // BF bar

  const bfBar=h('div',{style:{height:6,background:'var(--bg3)',borderRadius:3,marginBottom:10,position:'relative'}});
  bfBar.appendChild(h('div',{style:{position:'absolute',inset:0,borderRadius:3,background:'linear-gradient(to right,#378ADD 0%,#1D9E75 27%,#7F77DD 40%,#EF9F27 50%,#D85A30 70%)'}}));
  bfBar.appendChild(h('div',{style:{position:'absolute',top:'-3px',left:`${bfPct}%`,width:12,height:12,borderRadius:'50%',background:bfCat.color,border:'2px solid var(--bg2)',transform:'translateX(-50%)',boxShadow:'0 1px 4px rgba(0,0,0,.2)'}}));
  statCard.appendChild(bfBar);
  statCard.appendChild(h('div',{style:{fontSize:11,color:'var(--t4)',lineHeight:1.5}},'*Estimación basada en IMC (Deurenberg). Para mayor precisión: calliper o DEXA.'));

  // Age input for BF accuracy
  const ageRow=h('div',{style:{display:'flex',alignItems:'center',gap:8,marginTop:10,paddingTop:10,borderTop:'.5px solid var(--bd)'}});

    )));
  c.appendChild(streakRow);

  // Log form

  lc.appendChild(h('div',{style:{fontSize:14,fontWeight:500,color:'var(--t1)',marginBottom:10}},'Registrar peso de hoy'));
  const row=h('div',{style:{display:'flex',gap:8}});
  const wi=h('input',{type:'number',placeholder:'ej: 119.5',style:{flex:1}});
  wi.value=S.newWeight;
  wi.addEventListener('input',e=>S.newWeight=e.target.value);
  wi.addEventListener('keydown',e=>{if(e.key==='Enter')addWeight();});
  const sb=h('button',{style:{padding:'0 18px',fontSize:14,background:'none',border:'.5px solid var(--bd2)',borderRadius:10,color:'var(--t1)'}},'Guardar');
  sb.addEventListener('click',addWeight);
  row.appendChild(wi);row.appendChild(sb);lc.appendChild(row);c.appendChild(lc);

  // Weight chart
  if(log.length>1){
    const W=340,H=100,pad=26,vals=log.map(e=>e.weight);
    const minV=Math.min(...vals)-1,maxV=Math.max(...vals)+1;
    const xSc=i=>(i/(vals.length-1))*(W-pad*2)+pad;
    const ySc=v=>H-pad-((v-minV)/(maxV-minV||1))*(H-pad*2);
    const pts=vals.map((v,i)=>({x:xSc(i),y:ySc(v)}));
    const pl=pts.map(p=>`${p.x},${p.y}`).join(' ');
    const cc=h('div',{class:'card',style:{padding:'14px',marginBottom:10,overflow:'hidden'}});
    cc.appendChild(h('div',{style:{fontSize:13,fontWeight:500,color:'var(--t2)',marginBottom:8}},'Evolución de peso'));
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox',`0 0 ${W} ${H}`);svg.setAttribute('width','100%');svg.setAttribute('height',H);
    svg.innerHTML=`<defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1D9E75" stop-opacity="0.2"/><stop offset="100%" stop-color="#1D9E75" stop-opacity="0"/></linearGradient></defs><polygon points="${pl} ${pts[pts.length-1].x},${H} ${pts[0].x},${H}" fill="url(#wg)"/><polyline points="${pl}" fill="none" stroke="#1D9E75" stroke-width="2" stroke-linejoin="round"/><circle cx="${pts[pts.length-1].x}" cy="${pts[pts.length-1].y}" r="4" fill="#1D9E75"/><text x="${pts[pts.length-1].x}" y="${pts[pts.length-1].y-8}" text-anchor="middle" font-size="9" fill="#1D9E75">${vals[vals.length-1]}kg</text>`;

  }

  // History
  if(log.length>0){
    const hist=h('div',{class:'card',style:{overflow:'hidden',marginBottom:10}});
    hist.appendChild(h('div',{style:{padding:'11px 16px',borderBottom:'.5px solid var(--bd)',fontSize:14,fontWeight:500,color:'var(--t1)'}},'Historial de peso'));
    [...log].reverse().forEach((entry,i,arr)=>{
      const prev=i<arr.length-1?arr[i+1].weight:null,diff=prev!==null?+(entry.weight-prev).toFixed(1):null;
      const dc=diff===null?null:diff<0?'#1D9E75':diff>0?'#D85A30':'var(--t4)';
      hist.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'11px 16px',fontSize:14,borderBottom:i<arr.length-1?'.5px solid var(--bd)':'none'}},

        h('div',{style:{display:'flex',alignItems:'center',gap:10}},
          ...(diff!==null?[h('span',{style:{fontSize:12,color:dc}},(diff>0?'+':'')+diff+' kg')]:[]),

          h('button',{style:{background:'none',border:'none',color:'var(--t4)',fontSize:15,padding:'0 2px'},

          },'🗑')
        )
      ));
    });
    c.appendChild(hist);
  } else {
    c.appendChild(h('div',{style:{textAlign:'center',padding:'2rem',color:'var(--t3)',fontSize:14}},'Registra tu primer peso para ver el progreso'));
  }

  c.appendChild(h('button',{style:{width:'100%',padding:'13px',borderRadius:12,background:'none',border:'.5px solid var(--bd2)',color:'var(--t2)',fontSize:14},onClick:exportCSV},'⬇ Exportar datos como CSV'));
  return c;
}

  // Result
  if(S.chefLoading){
    c.appendChild(h('div',{class:'card',style:{padding:'20px',textAlign:'center'}},

      h('div',{style:{fontSize:14,color:'var(--t3)'}},'Preparando tu receta personalizada...')

  } else if(S.chefResult){
    const res=h('div',{class:'card',style:{padding:'16px'}});
    res.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
      h('span',{style:{fontSize:14,fontWeight:600,color:'var(--t1)'}},'🍽 Tu receta'),
      h('button',{style:{background:'none',border:'none',fontSize:13,color:'var(--t3)',padding:'4px 8px',borderRadius:8,border:'.5px solid var(--bd)'},
        onClick:()=>{S.chefResult='';S.chefInput='';renderContent();}
      },'Nueva ›')
    ));
    // Render markdown-like: bold **text**, bullet - item, newlines
    const formatted=S.chefResult
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
      .replace(/^[-•]\s/gm,'<span style="color:#1D9E75;margin-right:6px">•</span>')

    const content=document.createElement('div');
    content.innerHTML=formatted;
    res.appendChild(content);
    c.appendChild(res);
  }
  return c;
}

  // Stats snapshot
  const allEx=Object.values(getWK()).flat();
  const tracked=allEx.filter(ex=>(S.exHistory[ex.id]||[]).length>0);
  const improving=tracked.filter(ex=>{
    const hist=S.exHistory[ex.id]||[];
    if(hist.length<2)return false;
    const a=Math.max(...(hist[hist.length-2].sets||[]).filter(Boolean)||[0]);
    const b=Math.max(...(hist[hist.length-1].sets||[]).filter(Boolean)||[0]);
    return b>a;
  });
  const stagnant=tracked.filter(ex=>{
    const hist=S.exHistory[ex.id]||[];
    if(hist.length<3)return false;
    const vals=hist.slice(-3).map(e=>Math.max(...(e.sets||[]).filter(Boolean)||[0]));
    return vals.every(v=>v===vals[0]);
  });

  const snapGrid=h('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:12}});
  [{v:tracked.length,label:'Ejercicios\nregistrados',col:'var(--t1)'},{v:improving.length+'↑',label:'Mejorando\npeso',col:'#1D9E75'},{v:stagnant.length,label:'Posible\nestancamiento',col:stagnant.length>0?'#EF9F27':'var(--t3)'}]
    .forEach(s=>snapGrid.appendChild(h('div',{class:'card',style:{padding:'12px 6px',textAlign:'center'}},
      h('div',{style:{fontSize:20,fontWeight:700,color:s.col,lineHeight:1.2}},s.v),
      h('div',{style:{fontSize:10,color:'var(--t3)',marginTop:4,whiteSpace:'pre-line',lineHeight:1.4}},s.label)
    )));
  c.appendChild(snapGrid);

  // Run button
  c.appendChild(h('button',{style:{
    width:'100%',padding:'14px',borderRadius:14,border:'none',marginBottom:12,
    background:S.coachLoading?'var(--bg3)':'linear-gradient(135deg,#7F77DD,#1D9E75)',
    color:S.coachLoading?'var(--t3)':'#fff',fontSize:15,fontWeight:600,
  },onClick:runCoach},S.coachLoading?'⏳ Analizando tu progreso...':'🔍 Analizar mi progreso'));

  if(S.coachLoading){
    c.appendChild(h('div',{class:'card',style:{padding:'24px',textAlign:'center'}},
      h('div',{style:{fontSize:32,marginBottom:10}},'🧠'),
      h('div',{style:{fontSize:14,color:'var(--t3)'}},'Revisando historial de ejercicios y tendencias...')
    ));
  } else if(S.coachResult){
    const res=h('div',{class:'card',style:{padding:'16px'}});
    res.appendChild(h('div',{style:{fontSize:14,fontWeight:600,color:'var(--t1)',marginBottom:12}},'📋 Análisis de tu progreso'));
    const formatted=S.coachResult
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
      .replace(/^[-•]\s/gm,'<span style="color:#7F77DD;margin-right:6px">•</span>')
      .split('\n').map(l=>l?`<div style="margin-bottom:6px;font-size:14px;color:var(--t1);line-height:1.55">${l}</div>`:'<div style="height:5px"></div>').join('');
    const content=document.createElement('div');
    content.innerHTML=formatted;
    res.appendChild(content);
    res.appendChild(h('button',{style:{marginTop:12,width:'100%',padding:'11px',borderRadius:10,border:'.5px solid var(--bd2)',background:'none',color:'var(--t2)',fontSize:13},
      onClick:()=>{S.coachResult='';renderContent();}
    },'Nuevo análisis ›'));
    c.appendChild(res);
  }
  return c;
}

// ── PLAN EDITOR VIEW ─────────────────────────────────────────────────────────
function renderPlanEditor(){
  const c=h('div',{});
  const SCH=getSCH();
  const workout_types=['push','pull','legs','cardio','hyrox','rest'];

  // SECTION 1: Cambiar un día puntual
  c.appendChild(h('div',{style:{marginBottom:'1rem'}},
    h('div',{style:{fontSize:16,fontWeight:700,color:'var(--t1)',marginBottom:3}},'🔄 Cambiar un día'),
    h('div',{style:{fontSize:13,color:'var(--t3)',lineHeight:1.5,marginBottom:10}},'Solo para hoy. Se resetea automáticamente mañana.')
  ));
  DAYS.forEach((day,i)=>{
    const info=getSCH()[i];
    const isOverridden=S.dayOverride&&S.dayOverride.date===TODAY&&S.dayOverride.dayIdx===i;
    const isToday=i===todayIdx;
    const row=h('div',{style:{display:'flex',alignItems:'center',gap:8,padding:'10px 12px',marginBottom:6,borderRadius:12,background:'var(--bg2)',border:isToday?`1.5px solid ${info.color}`:'.5px solid var(--bd)',flexWrap:'wrap'}});
    row.appendChild(h('div',{style:{width:34,height:34,borderRadius:8,background:info.color+'18',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},
      h('span',{style:{fontSize:11,fontWeight:600,color:info.color}},day)
    ));
    row.appendChild(h('div',{style:{flex:1,minWidth:80}},
      h('div',{style:{fontSize:13,fontWeight:500,color:'var(--t1)',display:'flex',alignItems:'center',gap:5}},
        info.label,
        ...(isOverridden?[h('span',{style:{fontSize:9,background:'#EF9F2722',color:'#EF9F27',borderRadius:4,padding:'1px 5px'}},'modificado')]:[]),
        ...(isToday?[h('span',{style:{fontSize:9,background:info.color+'22',color:info.color,borderRadius:4,padding:'1px 5px'}},'hoy')]:[])
      )
    ));
    const btnRow=h('div',{style:{display:'flex',gap:5,alignItems:'center'}});
    const changeBtn=h('button',{style:{fontSize:12,padding:'5px 10px',borderRadius:8,border:'.5px solid var(--bd2)',background:'var(--bg3)',color:'var(--t2)'}},'Cambiar');
    changeBtn.addEventListener('click',()=>{
      const old=document.getElementById('dsel_'+i); if(old){old.remove();return;}
      const pop=h('div',{id:'dsel_'+i,style:{width:'100%',marginTop:8,display:'flex',gap:6,flexWrap:'wrap',padding:'8px',background:'var(--bg3)',borderRadius:10,border:'.5px solid var(--bd)'}});
      workout_types.forEach(type=>{
        const meta=TYPE_META[type]; const isAct=info.type===type;
        const opt=h('button',{style:{padding:'5px 10px',borderRadius:7,fontSize:12,fontWeight:isAct?600:400,border:isAct?`1.5px solid ${meta.color}`:'.5px solid var(--bd2)',background:isAct?meta.color+'18':'var(--bg2)',color:isAct?meta.color:'var(--t2)'}},meta.label);
        opt.addEventListener('click',()=>{S.dayOverride={dayIdx:i,type,date:TODAY};savePart('dayOverride');pop.remove();renderContent();});
        pop.appendChild(opt);
      });
      const can=h('button',{style:{padding:'5px 8px',borderRadius:7,fontSize:11,border:'.5px solid var(--bd2)',background:'none',color:'var(--t3)'}},'✕');
      can.addEventListener('click',()=>pop.remove());
      pop.appendChild(can);
      row.appendChild(pop);
    });
    btnRow.appendChild(changeBtn);
    if(isOverridden){
      const rst=h('button',{style:{fontSize:11,padding:'5px 8px',borderRadius:8,border:'.5px solid #EF9F2766',background:'#EF9F2712',color:'#EF9F27'}},'Restablecer');
      rst.addEventListener('click',()=>{S.dayOverride=null;savePart('dayOverride');renderContent();});
      btnRow.appendChild(rst);
    }
    row.appendChild(btnRow);
    c.appendChild(row);
  });

  // SECTION 2: Horario permanente
  c.appendChild(h('div',{style:{borderTop:'.5px solid var(--bd)',margin:'1.25rem 0 1rem'}}));
  c.appendChild(h('div',{style:{marginBottom:'1rem'}},
    h('div',{style:{fontSize:16,fontWeight:700,color:'var(--t1)',marginBottom:3}},'📅 Horario permanente'),
    h('div',{style:{fontSize:13,color:'var(--t3)',lineHeight:1.5}})
  ));
  const tempSched=S.customSchedule?{...S.customSchedule}:{};
  const schedRows=h('div',{style:{display:'flex',flexDirection:'column',gap:6,marginBottom:10}});
  DAYS.forEach((day,i)=>{
    const currentType=tempSched[i]||BASE_SCH[i].type;
    const row2=h('div',{style:{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:12,background:'var(--bg2)',border:'.5px solid var(--bd)'}});
    row2.appendChild(h('span',{style:{fontSize:13,fontWeight:500,color:'var(--t1)',minWidth:32}},day));
    const sel=document.createElement('select');
    Object.assign(sel.style,{flex:1,fontSize:14,padding:'6px 8px',borderRadius:8,border:'.5px solid var(--bd2)',background:'var(--bg2)',color:'var(--t1)',fontFamily:'inherit',outline:'none'});
    workout_types.forEach(type=>{
      const o=document.createElement('option'); o.value=type; o.textContent=TYPE_META[type].label;
      if(type===currentType)o.selected=true; sel.appendChild(o);
    });
    sel.addEventListener('change',e=>{tempSched[i]=e.target.value;});
    row2.appendChild(sel); schedRows.appendChild(row2);
  });
  c.appendChild(schedRows);
  const saveSch=h('button',{style:{width:'100%',padding:'12px',borderRadius:12,border:'none',background:'#1D9E75',color:'#fff',fontWeight:600,fontSize:14,marginBottom:8}},'Guardar horario');
  saveSch.addEventListener('click',()=>{S.customSchedule=tempSched;savePart('customSchedule');renderContent();alert('✅ Horario guardado');});
  c.appendChild(saveSch);
  const rstSch=h('button',{style:{width:'100%',padding:'10px',borderRadius:12,border:'.5px solid var(--bd2)',background:'none',color:'var(--t3)',fontSize:13}},'Restablecer horario original');
  rstSch.addEventListener('click',()=>{if(!confirm('¿Volver al horario original?'))return;S.customSchedule=null;savePart('customSchedule');renderContent();});
  c.appendChild(rstSch);

  // SECTION 3: Cambiar fase
  c.appendChild(h('div',{style:{borderTop:'.5px solid var(--bd)',margin:'1.25rem 0 1rem'}}));
  c.appendChild(h('div',{style:{marginBottom:'1rem'}},
    h('div',{style:{fontSize:16,fontWeight:700,color:'var(--t1)',marginBottom:3}},'🏋️ Fase de rutina'),
    h('div',{style:{fontSize:13,color:'var(--t3)',lineHeight:1.5}},'Cambia de fase cuando la rutina ya no te rete. Recomendado cada 4 semanas.')
  ));
  [1,2,3].forEach(phase=>{
    const p=PHASES[phase]; const isAct=S.currentPhase===phase;
    const card=h('div',{style:{padding:'14px',marginBottom:10,borderRadius:14,border:isAct?`2px solid ${p.color}`:'.5px solid var(--bd)',background:isAct?p.color+'08':'var(--bg2)'}});
    card.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}},
      h('span',{style:{fontSize:14,fontWeight:600,color:isAct?p.color:'var(--t1)'  }},p.label),
      h('span',{style:{fontSize:11,padding:'2px 8px',borderRadius:6,background:p.color+'18',color:p.color}},p.weeks+' sem')
    ));
    card.appendChild(h('div',{style:{fontSize:12,color:'var(--t3)',marginBottom:8}},p.desc));
    const push=p.workouts.push||[];
    card.appendChild(h('div',{style:{display:'flex',gap:5,flexWrap:'wrap',marginBottom:10}},
      ...push.slice(0,3).map(ex=>h('span',{style:{fontSize:10,padding:'2px 7px',borderRadius:5,background:'var(--bg3)',color:'var(--t3)',border:'.5px solid var(--bd)'}},ex.name.split(' ').slice(0,3).join(' ')))
    ));
    if(isAct){
      card.appendChild(h('div',{style:{textAlign:'center',fontSize:13,fontWeight:600,color:p.color}},'✓ Fase activa'));
    } else {
      const sw=h('button',{style:{width:'100%',padding:'10px',borderRadius:10,border:'none',background:p.color,color:'#fff',fontWeight:600,fontSize:14}},'Activar esta fase');
      sw.addEventListener('click',()=>{
        if(!confirm(`¿Cambiar a ${p.label}?\n\nTu historial de pesos se conserva. Se limpian las series completadas de hoy.`))return;
        S.currentPhase=phase; S.completed={}; savePart('currentPhase'); renderContent();
      });
      card.appendChild(sw);
    }
    c.appendChild(card);
  });
  return c;
}

function renderContent(){
  const el=document.getElementById('mc');if(!el)return;
  el.innerHTML='';
  if     (S.tab==='week')    el.appendChild(renderWeek());
  else if(S.tab==='today')   el.appendChild(renderToday());
  else if(S.tab==='meals')   el.appendChild(renderMeals());
  else if(S.tab==='chef')    el.appendChild(renderChef());
  else if(S.tab==='coach')   el.appendChild(renderCoach());
  else if(S.tab==='plan')    el.appendChild(renderPlanEditor());
  else                       el.appendChild(renderProgress());
  const tw=document.getElementById('tw');if(tw){tw.innerHTML='';renderTimer();}
  const old=document.getElementById('ml');if(old)old.remove();
  if(S.showChart){const m=renderChartModal(S.showChart);if(m){m.id='ml';document.getElementById('app').appendChild(m);}}
  if(S.showSummary){const m=renderSummary();if(m){m.id='ml';document.getElementById('app').appendChild(m);}}
}

function render(){
  const app=document.getElementById('app');app.innerHTML='';
  const info=getSCH()[S.viewDay];
  // Header
  app.appendChild(h('div',{class:'sticky-hdr',style:{padding:'14px 16px 12px'}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('div',{style:{display:'flex',alignItems:'center',gap:8}},
        h('span',{style:{fontSize:18,fontWeight:700,color:'var(--t1)'}},'Jorge Rojas'),
        ...(S.streak>0?[h('span',{style:{fontSize:13,color:'#D85A30',fontWeight:600}},S.streak+'🔥')]:[])
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:8}},
        h('span',{style:{fontSize:12,padding:'4px 10px',borderRadius:8,background:info.color+'22',color:info.color,fontWeight:600}},info.label+(info.optional?' · opcional':'')),
        h('button',{style:{background:'none',border:'none',fontSize:18,padding:'0 2px',lineHeight:1},
          onClick:()=>{S.darkMode=!S.darkMode;S.darkMode?document.documentElement.setAttribute('data-dark',''):document.documentElement.removeAttribute('data-dark');savePart('darkMode');render();}
        },S.darkMode?'☀️':'🌙')
      )
    ),
    h('p',{style:{fontSize:13,color:'var(--t4)',marginTop:3}},FULL[S.viewDay]+' · '+info.muscle)
  ));
  // Content
  const mc=h('div',{id:'mc',style:{padding:'.875rem 1rem'}});
  app.appendChild(mc);renderContent();
  // Timer
  app.appendChild(h('div',{id:'tw'}));
  // Bottom nav — 6 tabs
  const nav=h('nav',{id:'bnav'});
  [{key:'week',icon:'📅',label:'Semana'},{key:'today',icon:'💪',label:'Hoy'},{key:'meals',icon:'🥗',label:'Comidas'},{key:'chef',icon:'👨‍🍳',label:'Chef'},{key:'coach',icon:'🧠',label:'Coach'},{key:'plan',icon:'🔄',label:'Plan'},{key:'progress',icon:'📊',label:'Progreso'}].forEach(t=>{
    const active=S.tab===t.key;
    const btn=h('button',{class:'tab-btn',style:{color:active?'#1D9E75':'var(--t3)',borderTop:active?'2px solid #1D9E75':'2px solid transparent',padding:'8px 0'}},
      h('span',{style:{fontSize:15}},t.icon),
      h('span',{style:{fontSize:9,fontWeight:active?600:400}},t.label)
    );
    btn.addEventListener('click',()=>{
      S.tab=t.key;
      if(t.key==='today'&&['push','pull','legs','hyrox'].includes(getSCH()[S.viewDay].type))reqWL(); else relWL();
      render();
    });
    nav.appendChild(btn);
  });
  app.appendChild(nav);
}

  const m={name:'Jorge · Gym',short_name:'Gym',start_url:'.',display:'standalone',background_color:'#f5f5f3',theme_color:'#1D9E75',
    icons:[{src:'https://placehold.co/192x192/1D9E75/fff?text=G',sizes:'192x192',type:'image/png'},{src:'https://placehold.co/512x512/1D9E75/fff?text=G',sizes:'512x512',type:'image/png'}]};

  document.head.appendChild(l);
})();

// ── BOOT ─────────────────────────────────────────────────────────────────────
loadStorage();render();
if(['push','pull','legs','hyrox'].includes(getSCH()[todayIdx].type))reqWL();
</script>
